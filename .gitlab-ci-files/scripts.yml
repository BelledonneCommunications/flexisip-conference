# This file MUST only contain hidden jobs (beginning with `.`)

# Check available features of an installed flexisip-conference binary
.script-check-features:
  script:
    - FLEXISIP_INSTALL_DIR=/opt/belledonne-communications/flexisip-conference
    - FLEXISIP_BIN=${FLEXISIP_INSTALL_DIR}/bin/flexisip-conference
    - VERSION_STRING=$($FLEXISIP_BIN --version)
    - echo $VERSION_STRING | grep Conference
    - echo $VERSION_STRING | grep Soci
    - find $FLEXISIP_INSTALL_DIR -type d -name "liblinphone" -exec ls {}/plugins \; | grep "ektserver.so"
    # No graphical dependencies
    - "! ldd $FLEXISIP_BIN | grep --extended-regexp 'X|GL'"

# Check the permissions of the configuration and log folders and files
.script-check-permissions:
  script:
    - FLEXISIP_CONF_DIR=/etc/opt/belledonne-communications/flexisip-conference
    - FLEXISIP_LOG_DIR=/var/opt/belledonne-communications/flexisip-conference/log
    - echo $(stat -c "%n %a" ${FLEXISIP_CONF_DIR}) | grep 750
    - echo $(stat -c "%n %a" ${FLEXISIP_CONF_DIR}/flexisip-conference.conf) | grep 640
    - if [ -d "${FLEXISIP_LOG_DIR}" ]; then echo $(stat -c "%n %a" ${FLEXISIP_LOG_DIR}) | grep 750; fi